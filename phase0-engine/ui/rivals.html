function cardHTML(b) {
  return `<div class="card ${sel && sel !== b.label ? 'dim' : ''}" data-b="${b.label}" style="border-left-color:${b.color}">`
    + `<span class="tag ${b.role}">${b.role}</span> <span style="font-size:11px;color:#8aa0b4">${b.band} · ${b.corr}</span>`
    + `<div class="n" style="color:${b.color}">${b.disp}</div><div class="b">${b.type} · ${b.skipper}</div>`
    + `<div class="m">${b.rec || ''}${b.rec ? '<br>' : ''}${b.dist_nm} nm sailed${b.partial ? ' · <b style="color:#e0862a">partial track</b>' : ''}</div></div>`;
}
function groups() {
  const by = (r) => DATA.boats.filter(b => b.role === r);
  $('#groups').innerHTML = `<div class="grp">You</div><div class="cards">${by('YOU').map(cardHTML).join('')}</div>`
    + `<div class="grp">Follow — pace references</div><div class="cards">${by('FOLLOW').map(cardHTML).join('')}</div>`
    + `<div class="grp">Benchmarks — the boats to beat</div><div class="cards">${by('BENCHMARK').map(cardHTML).join('')}</div>`;
  document.querySelectorAll('#groups .card').forEach(c => c.onclick = () => { sel = sel === c.dataset.b ? null : c.dataset.b; render(); });
}
function stats() {
  const ljS = LJ.stats;
  const rows = DATA.boats.map(b => {
    const s = b.stats;
    if (!s) return `<tr><td class="l" style="color:${b.color}">${b.disp}</td><td colspan="5" style="text-align:left;color:#6f889e">${b.partial ? 'partial track — no trimmed speed' : '—'}</td></tr>`;
    const vs = ljS ? ((s.trimSOG_kn / ljS.trimSOG_kn - 1) * 100) : null;
    const vsCol = b.role === 'YOU' ? '#eaf1f7' : (vs > 0 ? '#5bd88a' : '#ff7a6b');
    const upS = s.outboundPctNorth == null ? '–' : `${100 - s.outboundPctNorth}% S`;
    const back = s.returnPctNorth == null ? '–' : `${s.returnPctNorth}% N`;
    return `<tr><td class="l" style="color:${b.color};font-weight:700">${b.disp}</td>`
      + `<td>${s.trimSOG_kn.toFixed(2)} kn</td>`
      + `<td style="color:${vsCol}">${b.role === 'YOU' ? '—' : (vs >= 0 ? '+' : '') + vs.toFixed(0) + '%'}</td>`
      + `<td>${s.trimDist_nm ?? b.dist_nm} nm</td><td>${upS}</td><td>${back}</td></tr>`;
  }).join('');
  $('#stats').innerHTML = `<thead><tr><th class="l">Boat</th><th>Trimmed SOG</th><th>vs LJ</th><th>Distance</th><th>Up-lake</th><th>Return</th></tr></thead><tbody>${rows}</tbody>`;
}
const scrub = $('#scrub'), tlabel = $('#tlabel');
function render() { const f = +scrub.value / 1000; draw(f); groups(); stats(); tlabel.textContent = f >= 1 ? 'full' : Math.round(f * 100) + '%'; }
scrub.oninput = render;
let playing = false, timer = null;
$('#play').onclick = function () { playing = !playing; this.textContent = playing ? '❚❚ Pause' : '► Play';
  if (playing) { if (+scrub.value >= 1000) scrub.value = 0; timer = setInterval(() => { scrub.value = Math.min(1000, +scrub.value + 8); render(); if (+scrub.value >= 1000) { playing = false; $('#play').textContent = '► Play'; clearInterval(timer); } }, 40); } else clearInterval(timer); };
$('#foot').innerHTML = `Routes = actual GPS tracks (${DATA.source}). Little Johnka in <b style="color:#ff5a3c">orange</b>; click a card to isolate a boat. <b>Trimmed SOG</b> = distance over the race window (fleet start estimate + official elapsed), the honest boat-for-boat speed. <b>Up-lake / Return</b> = which shore (S = Savoie/French, N = Vaud/Swiss) relative to the lake centerline. ${DATA.note || ''}`;
render();
</script>
</body>
</html>
