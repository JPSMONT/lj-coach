(function () {
  function select(n) {
    const c = CONTROLS.find((x) => x.n === n);
    document.querySelectorAll('.chip2').forEach((el) => el.classList.toggle('sel', +el.dataset.n === n));
    $('#art').innerHTML = `<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">${ICONS[n] || ''}</svg>`;
    $('#gnm').textContent = `${c.n}. ${c.name}`;
    $('#gwh').textContent = c.what;
    $('#gmp').innerHTML = c.more ? `<b>▲ more →</b> ${c.more}` : '';
    $('#glp').innerHTML = c.less ? `<b>▼ less →</b> ${c.less}` : '';
  }
  const groups = [...new Set(CONTROLS.map((c) => c.g))];
  $('#chips').innerHTML = groups.map((g) => `<div class="grpn">${g}</div>`
    + CONTROLS.filter((c) => c.g === g).map((c) => `<span class="chip2" data-n="${c.n}"><span class="num">${c.n}</span>${c.name}</span>`).join('')).join('');
  document.querySelectorAll('.chip2').forEach((el) => el.addEventListener('click', () => select(+el.dataset.n)));

  // what changed between setup A and B (control-id keyed) → show by name + open the guide on it
  const CID = { backstay: 1, mainsheet: 2, traveller: 3, cunningham: 4, outhaul: 5, vang: 6, rig_tension: 7, jib_sheet: 8, jib_lead: 9, barber_hauler: 10, jib_halyard: 11, spin_guy: 12, pole_height: 13, pole_angle: 14, spin_sheet: 15, tweakers: 16, spin_halyard: 17, crew_weight: 18 };
  const diffControls = (a = {}, b = {}) => { const ids = new Set([...Object.keys(a), ...Object.keys(b)]); const o = []; for (const id of ids) if (a[id] !== b[id]) o.push({ id, from: a[id] ?? '—', to: b[id] ?? '—' }); return o; };
  const CHANGED = diffControls((DATA.setupA || {}).controls, (DATA.setupB || {}).controls);
  if (CHANGED.length) {
    $('#changed').innerHTML = 'You changed: ' + CHANGED.map((c) => { const n = CID[c.id]; const nm = (CONTROLS.find((x) => x.n === n) || {}).name || c.id; return `<b>${nm}</b> (${c.from} → ${c.to}) <span class="lk" data-n="${n}">▸ show</span>`; }).join(' &nbsp;·&nbsp; ');
    document.querySelectorAll('#changed .lk').forEach((el) => el.addEventListener('click', () => select(+el.dataset.n)));
  }
  select(CHANGED.length ? (CID[CHANGED[0].id] || DATA.advisedControl || 3) : (DATA.advisedControl || 3));
})();
</script>
</body>
</html>
