 "analysis_note": "Zugersee races are short club triangles (~2–3 nm). Read these results as a competitive benchmark — fleet speed, who to watch, and Little Johnka's own trend — not a source of tactical route lessons: on a short course every boat sails almost the same line. Learning from rivals' paths (route, shore and wind choices) needs a long course, so that analysis is reserved for the Bol d'Or and other long regattas (see the Debrief tab)."
}
];

const $ = (s) => document.querySelector(s);
const NS = 'http://www.w3.org/2000/svg';
const VENUES = Array.isArray(DATA) ? DATA : [DATA];   // one page, multiple venues (drop a JSON in data/venues/)
const SHORE_LABELS = { 'bol-dor': ['↑ Vaud shore (Swiss, N)', '↓ Savoie shore (French, S)'], 'zugersee': ['↑ Untersee / Cham (N)', '↓ Obersee / Arth (S)'] };

// ---- course map: venue overview, or (overlay) a regatta's real GPS track + marks zoomed in ----
// overlay = { track:[[lon,lat],...], marks:[{name,lat,lon}], label } | null
function drawMap(D, overlay) {
  const C = D.course, shore = D.shoreline || [];
  const track = overlay && overlay.track && overlay.track.length ? overlay.track : null;
  // bounds: a track zooms to its own extent (+8% pad); otherwise the whole lake outline / route
  let lons, lats;
  if (track) { lons = track.map((p) => p[0]); lats = track.map((p) => p[1]); }
  else { const geo = shore.length ? shore.map((p) => [p[1], p[0]]) : [...(C.route_out || []), [C.start.lon, C.start.lat]]; lons = geo.map((p) => p[0]); lats = geo.map((p) => p[1]); }
  let minLon = Math.min(...lons), maxLon = Math.max(...lons), minLat = Math.min(...lats), maxLat = Math.max(...lats);
  if (track) { const px = (maxLon - minLon) * 0.08 || 1e-3, py = (maxLat - minLat) * 0.08 || 1e-3; minLon -= px; maxLon += px; minLat -= py; maxLat += py; }
  const midLat = (minLat + maxLat) / 2, kx = Math.cos(midLat * Math.PI / 180);
  const Wd = (maxLon - minLon) * kx || 1e-4, Hd = (maxLat - minLat) || 1e-4, VW = 900, PAD = 34, VH = Math.round((VW - 2 * PAD) * Hd / Wd + 2 * PAD);
  const svg = $('#svg'); svg.innerHTML = ''; svg.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
  const proj = (lon, lat) => [(lon - minLon) * kx / Wd * (VW - 2 * PAD) + PAD, (maxLat - lat) / Hd * (VH - 2 * PAD) + PAD];
  const dot = (p, r, fill, label, dy) => { const c = document.createElementNS(NS, 'circle'); c.setAttribute('cx', p[0]); c.setAttribute('cy', p[1]); c.setAttribute('r', r); c.setAttribute('fill', fill); c.setAttribute('stroke', '#0c1a2a'); c.setAttribute('stroke-width', 1.5); svg.appendChild(c); if (label) { const t = document.createElementNS(NS, 'text'); t.setAttribute('x', p[0] + 8); t.setAttribute('y', p[1] + (dy || 4)); t.setAttribute('fill', '#cfe0ef'); t.setAttribute('font-size', '12'); t.textContent = label; svg.appendChild(t); } };
  const txt = (x, y, s, anchor) => { const t = document.createElementNS(NS, 'text'); t.setAttribute('x', x); t.setAttribute('y', y); t.setAttribute('fill', '#54708a'); t.setAttribute('font-size', '11'); if (anchor) t.setAttribute('text-anchor', anchor); t.textContent = s; svg.appendChild(t); };
  if (shore.length) { const poly = document.createElementNS(NS, 'polygon'); poly.setAttribute('points', shore.map((p) => proj(p[1], p[0]).join(',')).join(' ')); poly.setAttribute('fill', '#0e2438'); poly.setAttribute('stroke', '#33506e'); poly.setAttribute('stroke-width', 1.5); svg.appendChild(poly); }
  if (!track) { const sl = SHORE_LABELS[D.id]; if (sl) { txt(VW / 2, 16, sl[0], 'middle'); txt(VW / 2, VH - 6, sl[1], 'middle'); } }
  if (track) {
    const pts = track.map((p) => proj(p[0], p[1]).join(',')).join(' ');
    const pl = document.createElementNS(NS, 'polyline'); pl.setAttribute('points', pts); pl.setAttribute('fill', 'none'); pl.setAttribute('stroke', '#ff5a3c'); pl.setAttribute('stroke-width', 2.5); pl.setAttribute('stroke-linejoin', 'round'); pl.setAttribute('stroke-linecap', 'round'); pl.setAttribute('opacity', '0.9'); svg.appendChild(pl);
    (overlay.marks || []).forEach((mk) => dot(proj(mk.lon, mk.lat), 6, '#e0a92a', mk.name || '', 4));
    dot(proj(track[0][0], track[0][1]), 5, '#5bd88a', 'Start', 4);
    dot(proj(track[track.length - 1][0], track[track.length - 1][1]), 5, '#eaf1f7', 'Finish', 16);
    if (overlay.label) txt(VW / 2, 16, overlay.label, 'middle');
  } else {
    if (C.route_out && C.route_out.length) {
      const R = C.route_out.map((p) => proj(p[0], p[1])), pts = R.map((p) => p.join(',')).join(' ');
      for (const [col, w, dash] of [['#ff5a3c', 3, null], ['#3ca7ff', 2, '5 5']]) { const pl = document.createElementNS(NS, 'polyline'); pl.setAttribute('points', pts); pl.setAttribute('fill', 'none'); pl.setAttribute('stroke', col); pl.setAttribute('stroke-width', w); if (dash) { pl.setAttribute('stroke-dasharray', dash); pl.setAttribute('opacity', '0.8'); } pl.setAttribute('stroke-linejoin', 'round'); pl.setAttribute('stroke-linecap', 'round'); svg.appendChild(pl); }
    }
    if (C.start) dot(proj(C.start.lon, C.start.lat), 6, '#eaf1f7', 'Start · ' + C.start.time_local, 4);
    if (C.rounding) dot(proj(C.rounding.lon, C.rounding.lat), 7, '#e0a92a', C.rounding.name, 4);
    if (C.finish) dot(proj(C.finish.lon, C.finish.lat), 5, '#5bd88a', 'Finish', 16);
  }
}

function render(D) {
  const C = D.course;
  $('#title').textContent = D.name;
  $('#chips').innerHTML = `<span class="chip">${D.waters}</span><span class="chip">${D.club}</span>`
    + `<span class="chip">${D.rating_system}</span><span class="chip cls">Our class: ${D.our_class}</span>`
    + `<span class="chip">capability L${D.capability_level}</span>`;
  $('#summary').textContent = C.summary;

  renderRegattas(D);   // multi-regatta venues (Zugersee) get a dropdown; single-race venues (Bol d'Or) hide it
  drawMap(D, null);    // venue overview; a regatta with a GPS track overlays it via drawMap(D, {track,...})

  // ---- facts (guarded for RC-set courses) ----
  $('#facts').innerHTML = [
    ['Distance', C.distance_km != null ? `${C.distance_km} km · ${C.distance_nm} nm` : 'RC-set course'],
    ['Start', C.start ? C.start.time_local : '—'],
    ['Rounding', C.rounding ? C.rounding.name : 'RC-set marks'],
    ['Time limit', D.time_limit_local],
  ].map(([k, v]) => `<div class="fact"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');

  $('#windsum').textContent = D.wind_climatology.summary;
  $('#wind').innerHTML = D.wind_climatology.patterns.map((p) => `<div class="card wind">
    <div class="n">${p.name}</div><div class="d">${p.dir} · ${p.when}</div>
    <div class="t">${p.character}</div><div class="tac"><b>Tactics:</b> ${p.tactics}</div></div>`).join('');

  $('#zones').innerHTML = D.tactical_zones.map((z) => `<div class="card">
    <div class="n">${z.name}</div><div class="t" style="margin-top:4px">${z.knowledge}</div></div>`).join('');

  $('#intel').innerHTML = D.regatta_intelligence.editions.map((e) => `<div class="card">
    <div class="n">${e.year}</div><div class="t" style="margin-top:4px">${e.conditions}</div>
    <div class="tac">${e.note || ''}</div></div>`).join('')
    + `<div class="card" style="border-left-color:#2c435a"><div class="t">${D.regatta_intelligence.note} See the <b>Rivals</b> and <b>Debrief</b> tabs for the loaded GPS + weakness analysis.</div></div>`;

  const stations = D.stations ? ` <b>Stations:</b> ${D.stations.map((s) => s.name).join(', ')}.` : '';
  const series = D.series && D.series.length ? `<b>Series:</b> ${D.series.join(' · ')}.<br>` : '';
  $('#foot').innerHTML = `<b>Weather:</b> ${D.weather_models.join(', ')}. <b>Lake model:</b> ${D.lake_model}.${stations}<br>`
    + series
    + `<b>Tracking:</b> ${D.tracking.provider} — ${D.tracking.note}<br><b>Sources:</b> ${D.sources.join(' · ')}. `
    + `Course marks are approximate and for orientation, not navigation.`;

  document.querySelectorAll('#vpick .vp').forEach((el) => el.classList.toggle('sel', el.dataset.id === D.id));
}

// ---- regatta dropdown (a venue can hold many regattas; each has its own format + tracking) ----
function regattaCard(r) {
  const bits = [];
  if (r.club) bits.push(`<span class="chip">${r.club}</span>`);
  if (r.date) bits.push(`<span class="chip">${r.date}</span>`);
  if (r.course) bits.push(`<span class="chip">${r.course} course</span>`);
  if (r.counts_to && r.counts_to !== '—') bits.push(`<span class="chip cls">${r.counts_to}</span>`);
  const links = [];
  if (r.kwindoo) links.push(`<a href="${r.kwindoo}" target="_blank" rel="noopener">Kwindoo live / track ↗</a>`);
  if (r.gpx) links.push(`<span class="d">GPX in Drive: ${r.gpx}</span>`);
  return `<div class="n">${r.name}</div><div class="t" style="margin-top:3px">${r.format || ''}</div>`
    + `<div class="meta">${bits.join('')}</div>`
    + (links.length ? `<div class="tac" style="margin-top:7px">${links.join(' &middot; ')}</div>` : '')
    + (r.note ? `<div class="tac">${r.note}</div>` : '');
}
function renderRegattas(D) {
  const rg = $('#rgrp'), rw = $('#rwrap'), ra = $('#ranalysis');
  if (!D.regattas || !D.regattas.length) { rg.style.display = 'none'; rw.style.display = 'none'; ra.style.display = 'none'; return; }
  rg.style.display = ''; rw.style.display = '';
  if (D.analysis_note) { ra.textContent = D.analysis_note; ra.style.display = ''; } else ra.style.display = 'none';
  const key = (r) => r.id || r.name;
  const opt = (r) => `<option value="${key(r)}">${r.name}${r.date ? ' · ' + r.date : ''}</option>`;
  let html = `<optgroup label="OSCA regattas">${D.regattas.map(opt).join('')}</optgroup>`;
  if (D.other_regattas && D.other_regattas.length) html += `<optgroup label="Other Zugersee regattas (GPX in Drive)">${D.other_regattas.map(opt).join('')}</optgroup>`;
  $('#rpick').innerHTML = html;
  const all = [...D.regattas, ...(D.other_regattas || [])];
  const show = (id) => {
    const r = all.find((x) => key(x) === id) || all[0];
    const hasEd = r.editions && r.editions.length;
    $('#rdetail').innerHTML = regattaCard(r)
      + (hasEd ? `<select id="rysel" class="rsel rysel"></select><div id="rytable"></div>` : '');
    if (hasEd) {
      const ys = document.getElementById('rysel');
      ys.innerHTML = r.editions.map((e) => `<option value="${e.year}">${e.year}${e.label ? ' · ' + e.label : ''} — Yardstick results</option>`).join('');
      const showYear = (y) => { document.getElementById('rytable').innerHTML = editionTable(r.editions.find((e) => String(e.year) === String(y)) || r.editions[0]); };
      ys.onchange = () => showYear(ys.value);
      showYear(r.editions[0].year);
    }
    // overlay this regatta's real GPS track on the map if we have one; else the venue overview
    drawMap(D, r.track ? { track: r.track, marks: r.marks, label: r.name + (r.track_label ? ' · ' + r.track_label : '') } : null);
  };
  $('#rpick').onchange = () => show($('#rpick').value);
  show(key(all[0]));
}

// per-year finishing list — Yardstick ranking only (OSCA club handicap deliberately excluded)
function editionTable(e) {
  if (!e.results || !e.results.length) return `<div class="tac" style="margin-top:7px">Yardstick finishing list — pending.</div>`;
  const mine = (r) => /6116|johnka|monteiro/i.test(`${r.skipper || ''} ${r.sailno || ''}`);
  const metric = e.metric === 'distance' ? 'Dist. (YS)' : 'Corr. (YS)';
  const rows = e.results.map((r) => `<tr class="${mine(r) ? 'me' : ''}"><td>${r.rank}</td>`
    + `<td>${r.skipper || ''}</td><td>${r.cls || ''}</td>`
    + `<td class="sn">${r.sailno || ''}</td>`
    + `<td class="num">${r.corrected || ''}</td></tr>`).join('');
  return `<table class="rtab"><thead><tr><th>#</th><th>Skipper</th><th>Class</th><th>Sail</th><th>${metric}</th></tr></thead><tbody>${rows}</tbody></table>`
    + (e.marks ? `<div class="tac" style="margin-top:5px"><b>Course:</b> ${e.marks}</div>` : '')
    + `<div class="tac">${e.note || ''} Swiss Sailing Yardstick — OSCA club handicap excluded.${e.entries ? ' ' + e.entries + ' boats.' : ''}</div>`;
}

// venue switcher
$('#vpick').innerHTML = VENUES.map((v) => `<span class="vp" data-id="${v.id}">${v.name}</span>`).join('');
document.querySelectorAll('#vpick .vp').forEach((el) => el.addEventListener('click', () => render(VENUES.find((v) => v.id === el.dataset.id))));
render(VENUES[0]);
</script>
<script>if('serviceWorker' in navigator){addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(()=>{}));}</script>
</body>
