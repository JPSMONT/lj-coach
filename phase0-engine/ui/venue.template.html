<!DOCTYPE html>
<!-- SOURCE TEMPLATE for venue.html. Do NOT edit venue.html by hand.
     Reusable venue page — edit this file + a data/venues/<venue>.json, then: node ui/build.mjs -->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Venue — LJ Coach</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;background:#0f1c2b;color:#eaf1f7}
  .wrap{max-width:940px;margin:0 auto;padding:18px}
  h1{font-size:20px;margin:0 0 2px}
  .sub{color:#8aa0b4;font-size:12.5px;margin-bottom:10px;line-height:1.5}
  .chips{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 10px}
  .chip{font-size:11px;font-weight:700;padding:3px 9px;border-radius:9px;background:#16273a;border:1px solid #2c435a;color:#cfe0ef}
  .chip.cls{border-color:#2aa06a;color:#7ee0a8}
  .grp{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:#8aa0b4;margin:18px 2px 7px;font-weight:700}
  .map{background:#12283f;border:1px solid #23384e;border-radius:12px;padding:6px}
  svg{display:block;width:100%;height:auto;background:#0c1a2a;border-radius:8px}
  .facts{display:grid;grid-template-columns:repeat(4,1fr);gap:9px;margin-top:8px}
  @media(max-width:640px){.facts{grid-template-columns:repeat(2,1fr)}}
  .fact{background:#16273a;border:1px solid #23384e;border-radius:10px;padding:9px 11px}
  .fact .k{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:#8aa0b4;font-weight:700}
  .fact .v{font-size:14px;font-weight:800;margin-top:2px}
  .cards{display:grid;grid-template-columns:1fr 1fr;gap:9px}
  @media(max-width:640px){.cards{grid-template-columns:1fr}}
  .card{background:#16273a;border:1px solid #23384e;border-left:4px solid #3a5570;border-radius:10px;padding:10px 12px}
  .card.wind{border-left-color:#3ca7ff}
  .card .n{font-size:13.5px;font-weight:800}
  .card .d{font-size:11px;color:#8aa0b4;margin:1px 0 5px}
  .card .t{font-size:12px;color:#cfe0ef;line-height:1.5}
  .card .tac{font-size:11.5px;color:#9fb4c8;margin-top:5px;line-height:1.45}
  .card .tac b{color:#7ee0a8}
  .foot{color:#6f889e;font-size:11px;margin-top:16px;line-height:1.6}
</style>
</head>
<body>
<div class="wrap">
  <h1 id="title">Venue</h1>
  <div class="chips" id="chips"></div>
  <div class="sub" id="summary"></div>

  <div class="grp">Course</div>
  <div class="map"><svg id="svg" viewBox="0 0 900 460" xmlns="http://www.w3.org/2000/svg"></svg></div>
  <div class="facts" id="facts"></div>

  <div class="grp">Wind — what to expect</div>
  <div class="sub" id="windsum" style="margin:-2px 0 8px"></div>
  <div class="cards" id="wind"></div>

  <div class="grp">Tactical zones</div>
  <div class="cards" id="zones"></div>

  <div class="grp">Regatta intelligence — past editions</div>
  <div class="cards" id="intel"></div>

  <div class="foot" id="foot"></div>
</div>

<script type="module">
//__ENGINE__//
//__DATA__//

const $ = (s) => document.querySelector(s);
const NS = 'http://www.w3.org/2000/svg';
const D = DATA, C = D.course;

$('#title').textContent = D.name;
$('#chips').innerHTML = `<span class="chip">${D.waters}</span><span class="chip">${D.club}</span>`
  + `<span class="chip">${D.rating_system}</span><span class="chip cls">Our class: ${D.our_class}</span>`
  + `<span class="chip">capability L${D.capability_level}</span>`;
$('#summary').textContent = C.summary;

// ---- course map ----
(function () {
  const shore = D.shoreline || [];   // [[lat,lon],...] real Léman coastline (reused from the Bol d'Or app)
  const pts = shore.length ? shore.map((p) => [p[1], p[0]]) : [...C.route_out, [C.start.lon, C.start.lat], [C.finish.lon, C.finish.lat], ...C.marks.map((m) => [m.lon, m.lat])];
  const lons = pts.map((p) => p[0]), lats = pts.map((p) => p[1]);
  const B = { minLon: Math.min(...lons), maxLon: Math.max(...lons), minLat: Math.min(...lats), maxLat: Math.max(...lats) };
  const midLat = (B.minLat + B.maxLat) / 2, kx = Math.cos(midLat * Math.PI / 180);
  const W = (B.maxLon - B.minLon) * kx, H = (B.maxLat - B.minLat), VW = 900, PAD = 34, VH = Math.round((VW - 2 * PAD) * H / W + 2 * PAD);
  const svg = $('#svg'); svg.setAttribute('viewBox', `0 0 ${VW} ${VH}`);
  const proj = (lon, lat) => [(lon - B.minLon) * kx / W * (VW - 2 * PAD) + PAD, (B.maxLat - lat) / H * (VH - 2 * PAD) + PAD];
  // draw the real lake first (filled water shape), route + marks go on top
  if (shore.length) { const poly = document.createElementNS(NS, 'polygon'); poly.setAttribute('points', shore.map((p) => proj(p[1], p[0]).join(',')).join(' ')); poly.setAttribute('fill', '#0e2438'); poly.setAttribute('stroke', '#33506e'); poly.setAttribute('stroke-width', 1.5); svg.appendChild(poly); }
  const line = (pA, pB, cls, w, dash) => { const l = document.createElementNS(NS, 'line'); l.setAttribute('x1', pA[0]); l.setAttribute('y1', pA[1]); l.setAttribute('x2', pB[0]); l.setAttribute('y2', pB[1]); l.setAttribute('stroke', cls); l.setAttribute('stroke-width', w || 2); if (dash) l.setAttribute('stroke-dasharray', dash); svg.appendChild(l); };
  const dot = (p, r, fill, label, dy) => { const c = document.createElementNS(NS, 'circle'); c.setAttribute('cx', p[0]); c.setAttribute('cy', p[1]); c.setAttribute('r', r); c.setAttribute('fill', fill); c.setAttribute('stroke', '#0c1a2a'); c.setAttribute('stroke-width', 1.5); svg.appendChild(c); if (label) { const t = document.createElementNS(NS, 'text'); t.setAttribute('x', p[0] + 8); t.setAttribute('y', p[1] + (dy || 4)); t.setAttribute('fill', '#cfe0ef'); t.setAttribute('font-size', '12'); t.textContent = label; svg.appendChild(t); } };
  // shore labels
  const nLab = document.createElementNS(NS, 'text'); nLab.setAttribute('x', VW / 2); nLab.setAttribute('y', 16); nLab.setAttribute('fill', '#54708a'); nLab.setAttribute('font-size', '11'); nLab.setAttribute('text-anchor', 'middle'); nLab.textContent = '↑ Vaud shore (Swiss, N)'; svg.appendChild(nLab);
  const sLab = document.createElementNS(NS, 'text'); sLab.setAttribute('x', VW / 2); sLab.setAttribute('y', VH - 6); sLab.setAttribute('fill', '#54708a'); sLab.setAttribute('font-size', '11'); sLab.setAttribute('text-anchor', 'middle'); sLab.textContent = '↓ Savoie shore (French, S)'; svg.appendChild(sLab);
  // route out (Geneva → Bouveret), then dashed return
  const R = C.route_out.map((p) => proj(p[0], p[1]));
  const pl = document.createElementNS(NS, 'polyline'); pl.setAttribute('points', R.map((p) => p.join(',')).join(' ')); pl.setAttribute('fill', 'none'); pl.setAttribute('stroke', '#ff5a3c'); pl.setAttribute('stroke-width', 3); pl.setAttribute('stroke-linejoin', 'round'); pl.setAttribute('stroke-linecap', 'round'); svg.appendChild(pl);
  const pr = document.createElementNS(NS, 'polyline'); pr.setAttribute('points', R.map((p) => p.join(',')).join(' ')); pr.setAttribute('fill', 'none'); pr.setAttribute('stroke', '#3ca7ff'); pr.setAttribute('stroke-width', 2); pr.setAttribute('stroke-dasharray', '5 5'); pr.setAttribute('opacity', '0.8'); svg.appendChild(pr);
  // marks + start/finish/rounding
  dot(proj(C.start.lon, C.start.lat), 6, '#eaf1f7', 'Start · ' + C.start.time_local, 4);
  dot(proj(C.rounding.lon, C.rounding.lat), 7, '#e0a92a', C.rounding.name, 4);
  dot(proj(C.finish.lon, C.finish.lat), 5, '#5bd88a', 'Finish', 16);
})();

$('#facts').innerHTML = [
  ['Distance', `${C.distance_km} km · ${C.distance_nm} nm`],
  ['Start', C.start.time_local],
  ['Rounding', C.rounding.name],
  ['Time limit', D.time_limit_local],
].map(([k, v]) => `<div class="fact"><div class="k">${k}</div><div class="v">${v}</div></div>`).join('');

$('#windsum').textContent = D.wind_climatology.summary;
$('#wind').innerHTML = D.wind_climatology.patterns.map((p) => `<div class="card wind">
  <div class="n">${p.name}</div><div class="d">${p.dir} · ${p.when}</div>
  <div class="t">${p.character}</div><div class="tac"><b>Tactics:</b> ${p.tactics}</div></div>`).join('');

$('#zones').innerHTML = D.tactical_zones.map((z) => `<div class="card">
  <div class="n">${z.name}</div><div class="t" style="margin-top:4px">${z.knowledge}</div></div>`).join('');

$('#intel').innerHTML = D.regatta_intelligence.editions.map((e) => `<div class="card">
  <div class="n">${e.year}</div><div class="t" style="margin-top:4px">${e.conditions}</div>
  <div class="tac">${e.note || ''}</div></div>`).join('')
  + `<div class="card" style="border-left-color:#2c435a"><div class="t">${D.regatta_intelligence.note} See the <b>Rivals</b> and <b>Debrief</b> tabs for the loaded GPS + weakness analysis.</div></div>`;

$('#foot').innerHTML = `<b>Weather:</b> ${D.weather_models.join(', ')}. <b>Lake model:</b> ${D.lake_model}. `
  + `<b>Tracking:</b> ${D.tracking.provider} — ${D.tracking.note}<br><b>Sources:</b> ${D.sources.join(' · ')}. `
  + `Course marks are approximate (per the Sailing Instructions) and for orientation, not navigation.`;
</script>
</body>
</html>
